<!DOCTYPE html>

<head>

<title>RUNCLUB 연간 회고</title>
<!--
  ============================================================================
  RUNCLUB 연간 회고 페이지 (Annual Review)
  ============================================================================
  위치: public/annual-review/index.html
  접근: https://<domain>/annual-review/

  설계 원칙:
  - 순수 프론트엔드, 정적 HTML. 기존 Next.js 앱과 완전히 격리.
  - 데이터는 전역 JS 객체 `REVIEW_DATA` 에서 로드하며, 현재는 더미 데이터.
  - 실제 API 연동 시 이 객체를 fetch 호출로 교체하면 됨.

  ============================================================================
  향후 API 데이터 인터페이스 (백엔드 연동 시 사용)
  ============================================================================

  GET /api/annual-review?year=2026
    → ReviewData (아래 타입 참조)

  GET /api/annual-review/summary?year=2026
    → { totalMembers, totalSessions, ... } (SummaryData)

  모든 필드는 optional — 데이터가 없는 해는 해당 차트를 숨김 처리.

  ============================================================================
  TypeScript 인터페이스 (실제 API 응답 형태)
  ============================================================================

  interface ReviewData {
    year: number;
    summary: SummaryData;
    attendance: AttendanceTrend[];
    sessionTypes: SessionTypeBreakdown[];
    topMembers: TopMember[];
    passSales: PassSalesData;
    peakMoments: PeakMoment[];
    monthlyHeatmap: MonthlyHeatmapEntry[];
  }

  interface SummaryData {
    totalMembers: number;         // 전체 회원 수
    newMembers: number;           // 신규 가입
    totalSessions: number;        // 전체 세션 수
    totalCheckins: number;        // 전체 출석체크 수
    mostPopularSession: string;   // 가장 인기 있었던 세션명
    totalPassesSold: number;      // 판매된 수강권 수
    totalRevenue: number;         // 총 매출
    avgAttendanceRate: number;    // 평균 출석률 (%)
    activeMembers: number;        // 활성 회원 (1회 이상 참석)
    retentionRate: number;        // 유지율 (%)
  }

  interface AttendanceTrend {
    month: string;                // '2026-01'
    total: number;                // 총 출석
    ebw: number;                  // EBW 출석
    slowrun: number;              // 슬로우롱런 출석
    marathon: number;             // 마라톤 출석
  }

  interface SessionTypeBreakdown {
    type: 'ebw' | 'slowrun' | 'marathon';
    label: string;                // 'EBW', '슬로우 롱런', '마라톤'
    count: number;                // 세션 수
    totalAttendance: number;      // 총 출석 인원
  }

  interface TopMember {
    id: string;
    name: string;
    attendanceCount: number;      // 총 출석 횟수
    favoriteType: string;         // 가장 많이 참석한 세션 유형
    totalMileage: number;         // 보유 적립금
    avatarUrl?: string;
  }

  interface PassSalesData {
    byProduct: PassProductSale[]; // 상품별 판매
    byMonth: MonthlyPassSale[];   // 월별 판매
  }

  interface PassProductSale {
    productId: string;
    productName: string;
    count: number;
    revenue: number;
  }

  interface MonthlyPassSale {
    month: string;
    count: number;
    revenue: number;
  }

  interface PeakMoment {
    date: string;
    title: string;
    sessionName: string;
    attendanceCount: number;
    highlight: string;            // ex: "역대 최다 인원 47명 참석!"
  }

  interface MonthlyHeatmapEntry {
    month: string;
    weekNumber: number;
    dayOfWeek: number;            // 0=일, 1=월, ...
    count: number;                // 출석 수
  }

  ============================================================================
  더미 데이터에서 사용하는 실제 DB 컬럼 매핑
  ============================================================================

  sessions 테이블:
    id, type, date, start_time, max_capacity, status, location, is_indoor

  reservations 테이블:
    id, member_id, session_id, status ('attended','noshow','cancelled'),
    reserved_at, checked_in_at

  members 테이블:
    id, name, phone, join_date, is_active, mileage_balance, total_purchased

  member_passes 테이블:
    id, member_id, product_id, price, status, payment_status, issued_date

  pass_products 테이블:
    id, name, category, price

  session_tags 테이블:
    id, label, color

  SQL 예시 (AttendanceTrend):
    SELECT
      TO_CHAR(s.date, 'YYYY-MM') AS month,
      COUNT(*) FILTER (WHERE r.status = 'attended') AS total,
      COUNT(*) FILTER (WHERE s.type = 'ebw' AND r.status = 'attended') AS ebw,
      COUNT(*) FILTER (WHERE s.type = 'slowrun' AND r.status = 'attended') AS slowrun,
      COUNT(*) FILTER (WHERE s.type = 'marathon' AND r.status = 'attended') AS marathon
    FROM sessions s
    JOIN reservations r ON s.id = r.session_id
    WHERE EXTRACT(YEAR FROM s.date) = $1
    GROUP BY month ORDER BY month

  SQL 예시 (TopMembers):
    SELECT
      m.id, m.name,
      COUNT(*) AS attendance_count,
      MODE() WITHIN GROUP (ORDER BY s.type) AS favorite_type,
      m.mileage_balance
    FROM members m
    JOIN reservations r ON m.id = r.member_id
    JOIN sessions s ON r.session_id = s.id
    WHERE r.status = 'attended' AND EXTRACT(YEAR FROM s.date) = $1
    GROUP BY m.id, m.name, m.mileage_balance
    ORDER BY attendance_count DESC LIMIT 10

  ============================================================================
-->
<style>

  /* ── 피크 모먼트 카드 ── */

  .member-row {

  .member-row .mem-name { font-size:13px; font-weight:600; color:#e2e8f0; flex:1; min-width:0 }

  .motion-line {
    position:absolute; height:1px;
    background:linear-gradient(90deg, transparent, rgba(99,102,241,0.2), transparent);

  }

  /* ── 반응형 ── */
  @media (min-width:600px) {
    .app { padding:0 32px }
    .chart-card { padding:28px 24px }
  }
</style>
</head>

      { id:'m5', name:'박지호', attendanceCount:48, favoriteType:'EBW', totalMileage:16000, avatarUrl:null }
    ],
    passSales: {
      byProduct: [
        { productId:'pp_001', productName:'EBW 멤버십', count:82, revenue:8200000 },
        { productId:'pp_002', productName:'슬로우 롱런 멤버십', count:145, revenue:1450000 },
        { productId:'pp_003', productName:'마라톤 클래스 (8주)', count:38, revenue:7600000 }
      ],
      byMonth: [
        { month:'2026-01', count:52, revenue:3800000 },
        { month:'2026-02', count:48, revenue:3100000 }
      ]
    },
    peakMoments: [
      { date:'2026-03-22', title:'슬로우 롱런 100회차 기념런', sessionName:'슬로우 롱런 클럽', attendanceCount:52, highlight:'100회 기념! 참석자 전원 기념 메달 증정 🎖️' },
      { date:'2026-04-05', title:'벚꽃 런 2026', sessionName:'슬로우 롱런 클럽', attendanceCount:44, highlight:'벚꽃 명소 코스, SNS 후기 200건 돌파' }
    ]
  }
};

// ══════════════════════════════════════════════════════════════════════
// RENDER ENGINE
// ══════════════════════════════════════════════════════════════════════

let currentYear = '2026';
let currentPage = 0;
const PAGES = ['summary', 'attendance', 'members', 'moments', 'sales']; // 5 pages

// ── Formatting helpers ──
const fmtWon = (v) => {
  if (v >= 10000) return (v/10000).toFixed(v%10000===0?0:1) + '만원';
  return v.toLocaleString() + '원';
};
const fmtNum = (v) => v.toLocaleString();

// ── Build page HTML ──
function buildPage(pageId, data) {
  switch(pageId) {
    case 'summary': return buildSummaryPage(data);
    case 'attendance': return buildAttendancePage(data);
    case 'members': return buildMembersPage(data);
    case 'moments': return buildMomentsPage(data);
    case 'sales': return buildSalesPage(data);
    default: return '';
  }
}

function buildSummaryPage(d) {
  const s = d.summary;
  return `
    <div class="chart-card">
      <div class="chart-label">OVERVIEW</div>
      <div class="chart-title">한눈에 보는 ${d.year}</div>
      <div class="chart-desc">회원, 세션, 출석, 수익 — ${d.year === '2026' ? '올해' : '2년간'}의 핵심 지표입니다</div>
      <div class="kpi-grid">
        <div class="kpi-item"><div class="kpi-value">${fmtNum(s.totalMembers)}</div><div class="kpi-label">전체 회원</div></div>
        <div class="kpi-item"><div class="kpi-value">${fmtNum(s.newMembers)}</div><div class="kpi-label">신규 가입</div></div>
        <div class="kpi-item"><div class="kpi-value">${fmtNum(s.totalSessions)}</div><div class="kpi-label">전체 세션</div></div>
        <div class="kpi-item"><div class="kpi-value">${fmtNum(s.totalCheckins)}</div><div class="kpi-label">출석 체크</div></div>
        <div class="kpi-item"><div class="kpi-value">${s.avgAttendanceRate}%</div><div class="kpi-label">평균 출석률</div></div>
        <div class="kpi-item"><div class="kpi-value">${s.retentionRate}%</div><div class="kpi-label">회원 유지율</div></div>
        <div class="kpi-item"><div class="kpi-value">${fmtWon(s.totalRevenue)}</div><div class="kpi-label">총 매출</div></div>
        <div class="kpi-item"><div class="kpi-value">🏃 ${s.mostPopularSession}</div><div class="kpi-label">최고 인기 세션</div></div>
      </div>
    </div>`;
}

function buildAttendancePage(d) {
  // 간단한 SVG 바 차트 (placeholder → 추후 Chart.js 또는 D3로 교체)
  const months = d.attendance;
  const maxVal = Math.max(...months.map(m=>m.total));
  const barW = 100 / months.length;
  let bars = months.map((m,i) => {
    const h = (m.total/maxVal*100).toFixed(1);
    const x = (i * barW + barW*0.15).toFixed(1);
    const w = (barW * 0.7).toFixed(1);
    return `<rect x="${x}%" y="${(100-h).toFixed(1)}%" width="${w}%" height="${h}%" rx="3" fill="url(#barGrad)" opacity="0.85">
      <title>${m.month}: ${m.total}회</title></rect>`;
  }).join('');

  return `
    <div class="chart-card">
      <div class="chart-label">ATTENDANCE TREND</div>
      <div class="chart-title">월별 출석 추이</div>
      <div class="chart-desc">EBW · 슬로우 롱런 · 마라톤 — ${d.year === '2026' ? '올해' : '2년간'} 월별 출석 기록</div>
      <div class="chart-body">
        <svg viewBox="0 0 400 220" style="width:100%;height:100%;max-height:280px" preserveAspectRatio="xMidYMid meet">
          <defs>
            <linearGradient id="barGrad" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="#6366f1" stop-opacity="0.9"/>
              <stop offset="100%" stop-color="#3b82f6" stop-opacity="0.5"/>
            </linearGradient>
          </defs>
          ${bars}
          <!-- baseline -->
          <line x1="0" y1="100%" x2="100%" y2="100%" stroke="#1e293b" stroke-width="1"/>
        </svg>
      </div>
    </div>`;
}

function buildMembersPage(d) {
  const members = d.topMembers;
  const ranks = ['gold','silver','bronze','',''];
  let rows = members.map((m,i) => `
    <div class="member-row">
      <div class="rank ${ranks[i]||''}">${i+1}</div>
      <div class="mem-name">${m.name}</div>
      <div class="mem-stat"><strong>${m.attendanceCount}회</strong><br>${m.favoriteType}</div>
    </div>
  `).join('');

  return `
    <div class="chart-card">
      <div class="chart-label">TOP MEMBERS</div>
      <div class="chart-title">열정적인 러너들</div>
      <div class="chart-desc">${d.year === '2026' ? '올해' : '2년간'} 가장 많이 달린 회원 TOP 5</div>
      <div class="member-list">${rows}</div>
    </div>`;
}

function buildMomentsPage(d) {
  const moments = d.peakMoments || [];
  if (moments.length === 0) {
    return `<div class="chart-card"><div class="chart-label">HIGHLIGHTS</div><div class="chart-title">기록적인 순간들</div><div class="chart-desc">데이터가 아직 쌓이지 않았어요. 조금만 더 달려볼까요?</div></div>`;
  }
  let items = moments.map(m => `
    <div class="moment-item">
      <div class="moment-date">${m.date.slice(5)}</div>
      <div class="moment-info">
        <div class="moment-title">${m.title}</div>
        <div class="moment-hl">${m.highlight}</div>
      </div>
      <div class="moment-num">${m.attendanceCount}</div>
    </div>
  `).join('');
  return `
    <div class="chart-card">
      <div class="chart-label">HIGHLIGHTS</div>
      <div class="chart-title">기록적인 순간들</div>
      <div class="chart-desc">가장 많은 러너가 모였던 특별한 날</div>
      <div class="moment-list">${items}</div>
    </div>`;
}

function buildSalesPage(d) {
  const prods = d.passSales.byProduct || [];
  let rows = prods.map(p => `
    <div class="member-row">
      <div class="mem-name" style="flex:1">${p.productName}</div>
      <div class="mem-stat"><strong>${p.count}건</strong><br>${fmtWon(p.revenue)}</div>
    </div>
  `).join('');

  return `
    <div class="chart-card">
      <div class="chart-label">PASS SALES</div>
      <div class="chart-title">수강권 판매 현황</div>
      <div class="chart-desc">${d.year === '2026' ? '올해' : '2년간'} 가장 사랑받은 수강권은?</div>
      <div class="member-list" style="margin-bottom:16px">${rows}</div>
      <div class="chart-body" style="min-height:120px;flex:none">
        <div class="placeholder">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="3"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="3" x2="9" y2="21"/></svg>
          <p>월별 매출 추이 차트 (준비 중)</p>
        </div>
      </div>
    </div>`;
}

// ── Render current page ──
function render() {
  const data = REVIEW_DATA[currentYear];
  const pageId = PAGES[currentPage];
  const html = buildPage(pageId, data);
  document.getElementById('pageArea').innerHTML = `
    <div class="page active">
      <div class="page-indicator"><span>${currentPage+1}</span> / ${PAGES.length}</div>
      ${html}
    </div>
  `;
  updateNav();
  updateYearPicker();
}

// ── Navigation ──
function updateNav() {
  document.getElementById('navDots').innerHTML = PAGES.map((_,i) =>
    `<div class="nav-dot ${i===currentPage?'active':''}" data-page="${i}"></div>`
  ).join('');
  document.querySelectorAll('.nav-dot').forEach(d => {
    d.addEventListener('click', () => { currentPage = +d.dataset.page; render(); });
  });
  document.getElementById('prevBtn').style.visibility = currentPage === 0 ? 'hidden' : '';
  document.getElementById('nextBtn').style.visibility = currentPage === PAGES.length-1 ? 'hidden' : '';
}

function updateYearPicker() {
  document.querySelectorAll('.year-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.year === currentYear);
  });
}

// ── Event listeners ──
document.getElementById('yearPicker').addEventListener('click', e => {
  const btn = e.target.closest('.year-btn');
  if (!btn) return;
  currentYear = btn.dataset.year;
  currentPage = 0;
  render();
});

document.getElementById('prevBtn').addEventListener('click', () => {
  if (currentPage > 0) { currentPage--; render(); }
});

document.getElementById('nextBtn').addEventListener('click', () => {
  if (currentPage < PAGES.length-1) { currentPage++; render(); }
});

// ── Keyboard navigation ──
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowLeft') { if (currentPage > 0) { currentPage--; render(); } }
  if (e.key === 'ArrowRight') { if (currentPage < PAGES.length-1) { currentPage++; render(); } }
});

// ── Touch swipe ──
let touchStartX = 0;
document.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; }, {passive:true});
document.addEventListener('touchend', e => {
  const diff = touchStartX - e.changedTouches[0].clientX;
  if (Math.abs(diff) > 50) {
    if (diff > 0 && currentPage < PAGES.length-1) { currentPage++; render(); }
    else if (diff < 0 && currentPage > 0) { currentPage--; render(); }
  }
}, {passive:true});

// ── Init ──
render();
</script>
</body>
</html>
