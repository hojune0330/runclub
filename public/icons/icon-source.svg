<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background: project primary blue, rounded square (iOS-style) -->
  <rect width="512" height="512" rx="112" ry="112" fill="#2563eb"/>

  <!-- Stylized running silhouette in white.
       Body angled forward, arms swinging, back leg lifted —
       reads as motion at any size. -->
  <g fill="#ffffff" stroke="none">
    <!-- Head -->
    <circle cx="312" cy="128" r="34"/>
    <!-- Torso (forward-leaning) -->
    <path d="M 280 168
             C 268 192, 264 220, 272 248
             L 220 280
             C 208 286, 204 300, 212 312
             C 220 324, 234 326, 244 320
             L 296 290
             C 308 284, 316 272, 318 258
             L 326 200
             Z"/>
    <!-- Front leg (bent, lifted forward) -->
    <path d="M 304 268
             L 332 312
             L 348 376
             C 350 388, 358 396, 370 396
             C 384 396, 392 384, 388 372
             L 372 308
             L 354 264
             Z"/>
    <!-- Back leg (extended behind) -->
    <path d="M 252 296
             L 224 348
             L 184 388
             C 174 398, 174 412, 184 420
             C 194 428, 208 426, 216 416
             L 264 368
             L 286 320
             Z"/>
    <!-- Front arm (swinging back) -->
    <path d="M 286 188
             L 332 196
             L 374 208
             C 386 212, 392 224, 388 236
             C 384 246, 372 252, 362 248
             L 318 236
             L 280 224
             Z"/>
    <!-- Back arm (swinging forward, bent) -->
    <path d="M 268 196
             L 232 184
             L 196 156
             C 186 148, 184 134, 192 124
             C 200 116, 214 116, 222 124
             L 252 152
             L 280 184
             Z"/>
  </g>
</svg>
