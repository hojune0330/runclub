# Render.com Blueprint for RunClub Manager.
#
# How to use:
#   1. Push this file to the main branch on GitHub.
#   2. In Render dashboard → "New +" → "Blueprint" → select this repo.
#   3. Render creates the web service AND the PostgreSQL database, and links
#      DATABASE_URL automatically via fromDatabase.
#   4. Set the secret env vars (JWT_SECRET, SEED_TOKEN) once after the first
#      deploy, then redeploy.
#
# After the first deploy:
#   - Allow seeding once:  set ALLOW_SEED=true and SEED_TOKEN=<random 32+ chars>
#   - Curl: POST https://<your-app>.onrender.com/api/seed?token=<SEED_TOKEN>
#   - Then immediately set ALLOW_SEED=false (or remove SEED_TOKEN) and redeploy.

databases:
  - name: runclub-db
    plan: basic-256mb        # $7/month, 256MB RAM, 1GB storage
    region: singapore        # closest to KR; change to oregon/frankfurt as needed
    postgresMajorVersion: '16'

services:
  - type: web
    name: runclub-manager
    runtime: node
    plan: starter            # $7/month, always-on, no sleep
    region: singapore
    branch: main
    autoDeploy: true
    buildCommand: npm ci && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: runclub-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true     # Render auto-generates a 32+ char secret
      # ── Seed gating (production-only) ──────────────────────────────
      # ALLOW_SEED + SEED_TOKEN must both be set to call /api/seed in prod.
      # Flip ALLOW_SEED back to 'false' immediately after first seed.
      - key: ALLOW_SEED
        value: 'false'
      - key: SEED_TOKEN
        sync: false             # set manually before first seed
      # ── First admin (used when SEED_MODE=production) ───────────────
      - key: SEED_MODE
        value: production
      - key: SEED_ADMIN_PHONE
        sync: false             # e.g. 010-1234-5678
      - key: SEED_ADMIN_PASSWORD
        sync: false             # ≥ 8 chars, will be hashed at seed time
      - key: SEED_ADMIN_NAME
        sync: false             # e.g. "장호준 코치"
      - key: SEED_ADMIN_EMAIL
        sync: false             # optional
      # ── Toss Payments (production payment gateway) ─────────────────
      # Set live_ck_* / live_sk_* only after Toss review and test payments.
      # NEXT_PUBLIC_APP_URL must be the public HTTPS origin, e.g.
      # https://runclub-manager.onrender.com (no trailing slash).
      - key: NEXT_PUBLIC_TOSS_CLIENT_KEY
        sync: false
      - key: TOSS_SECRET_KEY
        sync: false
      - key: NEXT_PUBLIC_APP_URL
        sync: false
      # ── Google Sheets sync (manager-friendly mirror) ───────────────
      # When false (default), every sync call is a no-op. Flip to 'true'
      # after running scripts/sheet-init.mjs and inviting the service
      # account as an Editor on the spreadsheet.
      - key: SHEET_SYNC_ENABLED
        value: 'false'
      - key: SHEET_MEMBER_IMPORT_ENABLED
        value: 'false'
      - key: GOOGLE_SHEET_ID
        sync: false             # set manually after creating the sheet
      - key: GOOGLE_SERVICE_ACCOUNT_JSON
        sync: false             # paste JSON or base64-encoded JSON
      - key: GOOGLE_SHEET_TAB_MEMBERS
        value: Members
      - key: GOOGLE_SHEET_TAB_PASSES
        value: Passes
      - key: GOOGLE_SHEET_TAB_ATTENDANCE
        value: Attendance
      - key: GOOGLE_SHEET_TAB_SESSIONS
        value: Sessions
      - key: GOOGLE_SHEET_TAB_ADMIN_LOG
        value: AdminLog
      - key: GOOGLE_SHEET_TAB_PASS_PRODUCTS
        value: PassProducts
      # Shared secret used by the sheet-sync-retry cron job. Generate once
      # (≥ 32 chars). The cron uses Authorization: Bearer <CRON_SECRET>.
      - key: CRON_SECRET
        generateValue: true

  # ── Cron: drain sheet_sync_queue every minute ────────────────────────
  # Replays any sheet writes that failed during the original API request
  # (e.g. transient Sheets API outage, quota). No-op when SHEET_SYNC_ENABLED
  # is false. Endpoint is auth-gated by CRON_SECRET.
  #
  # NOTE: This cron job uses "url" instead of buildCommand/startCommand.
  # Render Cron Jobs with type: 'url' are MUCH simpler — no npm ci, no
  # Docker build, just one HTTP call per tick. Perfect for this use case.
  # Requires the $RENDER_SERVICE_NAME web service to be running.
  - type: cron
    name: runclub-sheet-sync-retry
    runtime: node
    plan: starter
    region: singapore
    branch: main
    schedule: '*/5 * * * *'      # every 5 minutes (was 1 min — unnecessary load)
    buildCommand: echo ok        # no-op: we don't need a build for a curl call
    startCommand: |
      set -e
      # Derive APP_URL from the web service's RENDER_EXTERNAL_URL.
      # If not set, fall back to the known Render onrender.com URL.
      APP_URL="${APP_URL:-https://runclub-manager.onrender.com}"
      curl -fsS -X POST \
        -H "Authorization: Bearer $CRON_SECRET" \
        "$APP_URL/api/cron/sheet-sync-retry"
    envVars:
      - key: APP_URL
        # Default: use the actual Render service URL. Only override if
        # you're using a custom domain.
        value: https://runclub-manager.onrender.com
      - key: CRON_SECRET
        # MUST match the CRON_SECRET in the web service above.
        # Run: openssl rand -hex 32  to generate a new one if needed.
        sync: false
